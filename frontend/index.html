<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/ifesquare.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ifesquare — Shop Ledger &amp; Sales Analytics</title>
    <meta
      name="description"
      content="Ifesquare replaces a handwritten stock ledger with a web dashboard that auto-calculates sales and visualizes them for small shops."
    />
    <meta name="theme-color" content="#009B4D" />
    <!-- Apply theme before paint to avoid light/dark flash -->
    <script>
      (function () {
        try {
          var key = "ifesquare-theme";
          var stored = localStorage.getItem(key);
          var theme =
            stored === "light" || stored === "dark"
              ? stored
              : window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
          var root = document.documentElement;
          if (theme === "dark") root.classList.add("dark");
          else root.classList.remove("dark");
          root.style.colorScheme = theme;
          root.dataset.theme = theme;
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
